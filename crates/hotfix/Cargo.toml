[package]
name = "hotfix"
description = "An experimental FIX engine"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
redb = ["dep:redb"]
mongodb = ["dep:mongodb"]
dynamodb = ["dep:aws-config", "dep:aws-sdk-dynamodb", "dep:serde_dynamo"]

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
aws-config = { version = "1", optional = true }
aws-sdk-dynamodb = { version = "^0.39", optional = true }
async-trait = "^0.1.73"
chrono = { version = "0.4", features = ["serde"] }
futures = "^0.3.28"
hotfix-message = { version = "0.0.23", path = "../hotfix-message" }
mongodb = { version = "^2.7", optional = true }
pki-types = { package = "rustls-pki-types", version = "^0.2" }
redb = { version = "^1.1.0", optional = true }
rustls = "^0.21.5"
rustls-pemfile = "=2.0.0-alpha.1"
serde = { workspace = true, features = ["derive"] }
serde_dynamo = { version = "^4.2.12", features = ["aws-sdk-dynamodb+0_39"], optional = true }
thiserror = { workspace = true }
tokio = { version = "^1", features = ["full"] }
tokio-rustls = "^0.24.1"
toml = { workspace = true }
tracing = { workspace = true }
uuid = { version = "1.5.0", features = ["v4"] }
